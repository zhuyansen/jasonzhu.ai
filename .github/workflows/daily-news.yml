name: Daily AI News Digest

on:
  schedule:
    # 主跑：北京时间 08:00 (UTC 00:00)
    - cron: "0 0 * * *"
    # 备跑 1：北京时间 09:30 (UTC 01:30) — 主跑挂了 90 分钟后自动补
    - cron: "30 1 * * *"
    # 备跑 2：北京时间 11:00 (UTC 03:00) — 二次保险
    - cron: "0 3 * * *"
  workflow_dispatch: # 支持手动触发，可指定 date 回填历史
    inputs:
      date:
        description: "回填日期 YYYY-MM-DD（留空 = 今天）"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  collect-news:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Collect and generate news
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: "https://api.aigocode.com"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DATE: ${{ inputs.date }}
        run: node scripts/collect-news.mjs

      - name: Generate daily news cover image
        continue-on-error: true
        env:
          APIMART_API_KEY: ${{ secrets.APIMART_API_KEY }}
        run: node scripts/generate-news-image.mjs ${{ inputs.date }}

      - name: Check for changes
        id: changes
        run: |
          if ! git diff --quiet src/content/news/ src/generated/news.json public/news/; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git ls-files --others --exclude-standard public/news/ src/content/news/ | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/news/ src/generated/news.json public/news/
          DATE_LABEL="${{ inputs.date }}"
          if [ -z "$DATE_LABEL" ]; then DATE_LABEL=$(date +%Y-%m-%d); fi
          git commit -m "📰 AI 快讯自动采集 ${DATE_LABEL}"
          git push

      - name: Send digest email
        if: steps.changes.outputs.changed == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/send-digest-email.mjs

      # 失败通知 —— 三次都挂才发，避免噪音
      - name: Notify on final failure (03:00 UTC retry)
        if: failure() && github.event.schedule == '0 3 * * *'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$ALERT_EMAIL" ]; then
            echo "⚠️ RESEND_API_KEY / ALERT_EMAIL 未设置，跳过告警邮件"
            exit 0
          fi
          DATE=$(date +%Y-%m-%d)
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"alerts@jasonzhu.ai\",
              \"to\": [\"$ALERT_EMAIL\"],
              \"subject\": \"⚠️ AI 快讯 cron 三次全失败 ($DATE)\",
              \"html\": \"今天 (UTC 00:00 / 01:30 / 03:00) 三次 cron 全部失败，请手动检查：<br><a href='$GH_RUN_URL'>查看日志</a>\"
            }"
